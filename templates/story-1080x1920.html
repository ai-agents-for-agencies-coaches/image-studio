<!doctype html>
<!--
  TEMPLATE: story-1080x1920
  Use case: FB/IG story or reel cover, vertical full-bleed
  Render: node render.js --input story-1080x1920.html --output out.png --width 1080 --height 1920 --scale 2
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
  .display { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.04em; line-height: 0.92; }
</style>
</head>
<body>
  <div class="relative w-[1080px] h-[1920px] overflow-hidden"
       style="background: linear-gradient(180deg, #1a0f08 0%, #2d1810 30%, #0f0805 100%);">

    <!-- Top abstract gradient blob -->
    <div class="absolute -top-60 left-1/2 -translate-x-1/2 w-[900px] h-[900px] rounded-full"
         style="background: radial-gradient(circle, rgba(255,150,60,0.45) 0%, rgba(255,100,30,0) 65%); filter: blur(40px);"></div>

    <!-- Bottom glow -->
    <div class="absolute -bottom-40 right-0 w-[700px] h-[700px] rounded-full"
         style="background: radial-gradient(circle, rgba(255,90,40,0.3) 0%, rgba(255,90,40,0) 70%); filter: blur(50px);"></div>

    <!-- Grain -->
    <div class="absolute inset-0 opacity-[0.12] mix-blend-overlay"
         style="background-image: url(&quot;data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>&quot;);"></div>

    <div class="relative h-full flex flex-col p-20 text-white">

      <!-- Top brand bar -->
      <div class="flex items-center justify-between pt-8">
        <div class="text-sm font-bold tracking-[0.3em] uppercase text-orange-300">{{BRAND}}</div>
        <div class="text-xs font-medium tracking-widest uppercase text-white/50">{{CITY}}, FL</div>
      </div>

      <!-- Center content -->
      <div class="flex-1 flex flex-col justify-center">
        <div class="inline-block self-start bg-white/10 backdrop-blur-md border border-white/25 rounded-full px-5 py-2 text-xs font-bold tracking-[0.25em] uppercase mb-10">
          A quick note for homeowners
        </div>
        <h1 class="display text-white text-[150px] font-bold mb-12">
          {{HEADLINE_LINE_1}}<br/>
          <span class="text-orange-300">{{HEADLINE_LINE_2}}</span>
        </h1>
        <p class="text-white/80 text-3xl leading-snug max-w-[850px]">
          {{SUBHEAD}}
        </p>
      </div>

      <!-- Bottom CTA -->
      <div class="pb-12">
        <div class="inline-flex items-center gap-5 bg-orange-400 text-neutral-950 rounded-full pl-10 pr-7 py-7 mb-6">
          <span class="text-3xl font-bold">{{CTA}}</span>
          <span class="w-14 h-14 rounded-full bg-neutral-950 text-orange-400 flex items-center justify-center text-3xl">→</span>
        </div>
        <div class="text-white/60 text-base">
          ★★★★★ 4.9 — 200+ homeowners served · Licensed &amp; Insured
        </div>
      </div>

    </div>
  </div>
</body>
</html>
